<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFDC Log Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
:root {
  --bg: #0f1115;
  --panel: rgba(25,28,36,0.6);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --dim: #64748b;
  --blue: #3b82f6;
  --blue-h: #2563eb;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #8b5cf6;
  --mono: 'JetBrains Mono','Cascadia Code',monospace;
}
*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
html,body{margin:0;padding:0;height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;
  background-image:radial-gradient(circle at 15% 50%,rgba(59,130,246,.06),transparent 25%),radial-gradient(circle at 85% 30%,rgba(139,92,246,.06),transparent 25%)}
.icon{font-family:'Material Symbols Outlined';font-size:1.1rem;vertical-align:middle;font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:.75rem 2rem;display:flex;align-items:center;border-bottom:1px solid var(--border);background:rgba(15,17,21,.8);backdrop-filter:blur(12px);z-index:10}
.logo{display:flex;align-items:center;gap:.5rem}
.logo .icon{font-size:1.5rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo h1{margin:0;font-size:1.15rem;font-weight:600;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em}
.main{flex:1;overflow:hidden;display:flex}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}

/* Drop Zone */
.drop-zone{width:100%;max-width:650px;border:2px dashed var(--border);border-radius:20px;padding:4rem 2rem;text-align:center;cursor:pointer;transition:all .3s;background:var(--panel);backdrop-filter:blur(12px)}
.drop-zone:hover{border-color:var(--blue);background:rgba(59,130,246,.05)}
.drop-zone.drag-over{border-color:var(--blue);background:rgba(59,130,246,.1);transform:scale(1.02);box-shadow:0 0 40px rgba(59,130,246,.15)}
.drop-zone .icon{font-size:3.5rem;color:rgba(255,255,255,.4);display:block;margin-bottom:1rem}
.drop-zone h2{margin:0 0 .5rem;font-weight:600;font-size:1.25rem}
.drop-zone p{margin:0;color:var(--muted);font-size:.875rem}
.drop-zone .hint{margin-top:1.5rem;font-size:.75rem;color:var(--dim);letter-spacing:.1em}

/* Loading */
.loading{text-align:center}
.loading h3{margin:1rem 0 .25rem;font-weight:600}
.loading .sub{color:var(--dim);font-size:.85rem;margin:0 0 1.5rem}
.spinner{width:3rem;height:3rem;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{display:flex;align-items:center;gap:1rem;max-width:300px;margin:0 auto}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .2s}
.prog-label{font-size:.8rem;color:var(--muted);font-family:var(--mono);min-width:3rem}

/* Results */
.results{display:flex;flex-direction:column;height:100%;overflow:hidden;width:100%}
.toolbar{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(25,28,36,.4);backdrop-filter:blur(12px)}
.toolbar h3{margin:0;font-size:.95rem;font-weight:600}
.toolbar .meta{display:flex;gap:.75rem;font-size:.75rem;color:var(--dim)}
.spacer{flex:1}
.back-btn{background:none;border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:8px;padding:.4rem;cursor:pointer;display:flex;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.08)}

.health{display:flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border-radius:20px;font-size:.8rem;font-weight:600}
.health.critical{background:rgba(239,68,68,.15);color:#f87171}
.health.warning{background:rgba(245,158,11,.15);color:#fbbf24}
.health.moderate{background:rgba(59,130,246,.15);color:#60a5fa}
.health.good{background:rgba(16,185,129,.15);color:#34d399}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(15,17,21,.5);padding:0 1.5rem}
.tab{display:flex;align-items:center;gap:.4rem;padding:.75rem 1.25rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-badge{background:rgba(239,68,68,.2);color:#f87171;padding:.1rem .5rem;border-radius:10px;font-size:.7rem;font-weight:600}
.tab-content{flex:1;overflow-y:auto;padding:1.5rem}

/* Summary Cards */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1.5rem}
.s-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center}
.s-val{font-size:1.75rem;font-weight:700;font-family:var(--mono)}
.s-lbl{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:.25rem}

/* Insights */
.insight{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;border-left:4px solid transparent;transition:all .2s}
.insight:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.insight.critical{border-left-color:var(--red);background:rgba(239,68,68,.04)}
.insight.warning{border-left-color:var(--orange);background:rgba(245,158,11,.04)}
.insight.info{border-left-color:var(--green);background:rgba(16,185,129,.04)}
.insight-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.sev-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.sev-badge .icon{font-size:.9rem}
.sev-badge.critical{background:rgba(239,68,68,.15);color:#f87171}
.sev-badge.warning{background:rgba(245,158,11,.15);color:#fbbf24}
.sev-badge.info{background:rgba(16,185,129,.15);color:#34d399}
.cat-badge{font-size:.65rem;color:var(--muted);font-weight:500;letter-spacing:.05em;display:flex;align-items:center;gap:.25rem}
.cat-badge .icon{font-size:.85rem}
.insight h4{margin:0 0 .5rem;font-size:1rem;font-weight:600}
.insight .desc{margin:0 0 1rem;font-size:.85rem;color:var(--muted);line-height:1.5}
.insight-box{display:flex;gap:.75rem;padding:.75rem;border-radius:8px;margin-bottom:.5rem;font-size:.85rem;line-height:1.5}
.insight-box .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.insight-box strong{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.insight-box p{margin:0;color:#cbd5e1}
.box-impact{background:rgba(139,92,246,.08)}.box-impact .icon,.box-impact strong{color:#a78bfa}
.box-cta{background:rgba(16,185,129,.08)}.box-cta .icon,.box-cta strong{color:#34d399}
.savings{display:inline-flex;align-items:center;gap:.35rem;margin-top:.5rem;padding:.3rem .75rem;border-radius:20px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.8rem;font-weight:600}
.savings .icon{font-size:1rem}

/* Limit Bars */
.limits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem}
.limit{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;transition:border-color .3s}
.limit.warning{border-color:rgba(245,158,11,.3)}
.limit.warning .lbar-fill{background:linear-gradient(90deg,#f59e0b,#d97706)}
.limit.warning .lbar-pct{color:#fbbf24}
.limit.critical{border-color:rgba(239,68,68,.3)}
.limit.critical .lbar-fill{background:linear-gradient(90deg,#ef4444,#dc2626)}
.limit.critical .lbar-pct{color:#f87171}
.limit.ok .lbar-fill{background:linear-gradient(90deg,#10b981,#059669)}
.limit.ok .lbar-pct{color:#34d399}
.limit-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.limit-name{display:flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:500}
.limit-name .icon{font-size:1rem;color:var(--muted)}
.limit-val{font-size:.75rem;color:var(--muted);font-family:var(--mono)}
.lbar-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.lbar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.25,.8,.25,1)}
.lbar-pct{font-size:.7rem;font-weight:600;margin-top:.25rem;text-align:right}

/* Tables */
.section-title{display:flex;align-items:center;gap:.5rem;margin:1.5rem 0 .75rem;font-size:.9rem;font-weight:600}
.section-title:first-child{margin-top:0}
.section-title .icon{font-size:1.1rem;color:var(--muted)}
.tbl-wrap{background:rgba(25,28,36,.4);border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:500px;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th,td{padding:.6rem 1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
th{background:rgba(255,255,255,.02);color:var(--muted);font-weight:500;position:sticky;top:0;z-index:1}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.mono{font-family:var(--mono);font-size:.78rem}
.muted{color:var(--dim)}
.nowrap{white-space:nowrap}
.qcell{word-break:break-all;max-width:500px}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:10px;font-size:.72rem;font-weight:600}
.badge.ok{background:rgba(16,185,129,.15);color:#34d399}
.badge.warn{background:rgba(239,68,68,.15);color:#f87171}

/* DML Bars */
.dml-bars{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}
.dml-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem;font-size:.82rem}
.dml-bar-track{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.dml-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue-h));border-radius:4px;transition:width .6s cubic-bezier(.25,.8,.25,1)}
.dml-bar-fill.w{background:linear-gradient(90deg,var(--orange),#d97706)}

.empty-state{text-align:center;padding:3rem;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;display:block;margin-bottom:1rem;opacity:.5}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="icon">query_stats</span>
      <h1>SFDC Log Analyzer</h1>
    </div>
  </header>
  <div class="main" id="main"></div>
</div>

<script>
// ======================== STATE ========================
let analysis = null;
let activeTab = 'insights';

const $ = (id) => document.getElementById(id);
const main = $('main');

// ======================== RENDER ========================
function showDropZone() {
  main.innerHTML = `
    <div class="center">
      <div class="drop-zone" id="dz">
        <input type="file" id="fi" accept=".log,.txt" hidden>
        <span class="icon">cloud_upload</span>
        <h2>Drop your Salesforce debug log here</h2>
        <p>or click to browse &mdash; works with files of any size</p>
        <div class="hint">.log &bull; .txt</div>
      </div>
    </div>`;

  const dz = $('dz'), fi = $('fi');
  dz.onclick = () => fi.click();
  fi.onchange = () => fi.files[0] && analyze(fi.files[0]);
  dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');
  dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag-over'); e.dataTransfer.files[0] && analyze(e.dataTransfer.files[0]); };
}

function showLoading(name) {
  main.innerHTML = `
    <div class="center">
      <div class="loading">
        <div class="spinner"></div>
        <h3>Analyzing ${esc(name)}</h3>
        <p class="sub">Streaming through log file line by line</p>
        <div class="prog-wrap">
          <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
          <span class="prog-label" id="pl">0%</span>
        </div>
      </div>
    </div>`;
}

function updateProgress(pct) {
  const p = Math.round(pct);
  const pf = $('pf'), pl = $('pl');
  if (pf) pf.style.width = p + '%';
  if (pl) pl.textContent = p + '%';
}

function showResults(data) {
  analysis = data;
  activeTab = 'insights';
  renderResults();
}

function renderResults() {
  const d = analysis;
  const sc = scoreColor(d);
  const sl = {critical:'Needs Attention',warning:'Could Improve',moderate:'Mostly OK',good:'Healthy'}[sc];
  const si = {critical:'error',warning:'warning',moderate:'info',good:'check_circle'}[sc];

  main.innerHTML = `
    <div class="results">
      <div class="toolbar">
        <button class="back-btn" onclick="showDropZone()"><span class="icon">arrow_back</span></button>
        <div>
          <h3>${esc(d.fileName)}</h3>
          <div class="meta">
            <span>${fmtSize(d.fileSize)}</span>
            <span>${d.linesProcessed.toLocaleString()} lines</span>
            <span>parsed in ${fmtMs(d.parseTimeMs)}</span>
          </div>
        </div>
        <div class="spacer"></div>
        <div class="health ${sc}"><span class="icon">${si}</span> ${sl}</div>
      </div>
      <div class="tabs">
        <button class="tab ${activeTab==='insights'?'active':''}" onclick="switchTab('insights')">
          <span class="icon">lightbulb</span> Insights & Actions
          ${d.insights.length?`<span class="tab-badge">${d.insights.length}</span>`:''}
        </button>
        <button class="tab ${activeTab==='limits'?'active':''}" onclick="switchTab('limits')">
          <span class="icon">speed</span> Governor Limits
        </button>
        <button class="tab ${activeTab==='soql'?'active':''}" onclick="switchTab('soql')">
          <span class="icon">search</span> SOQL (${d.totalSoql})
        </button>
        <button class="tab ${activeTab==='dml'?'active':''}" onclick="switchTab('dml')">
          <span class="icon">edit</span> DML (${d.totalDml})
        </button>
      </div>
      <div class="tab-content" id="tc"></div>
    </div>`;
  renderTab();
}

function switchTab(t) { activeTab = t; renderResults(); }

function renderTab() {
  const d = analysis, tc = $('tc');
  if (activeTab === 'insights') tc.innerHTML = renderInsights(d);
  else if (activeTab === 'limits') tc.innerHTML = renderLimits(d);
  else if (activeTab === 'soql') tc.innerHTML = renderSoql(d);
  else if (activeTab === 'dml') tc.innerHTML = renderDml(d);
}

// ======================== TAB RENDERERS ========================

function renderInsights(d) {
  const cards = `
    <div class="summary-row">
      <div class="s-card"><div class="s-val">${d.totalSoql}</div><div class="s-lbl">SOQL Queries</div></div>
      <div class="s-card"><div class="s-val">${d.totalSoqlRows.toLocaleString()}</div><div class="s-lbl">Rows Retrieved</div></div>
      <div class="s-card"><div class="s-val">${d.totalDml}</div><div class="s-lbl">DML Operations</div></div>
      <div class="s-card"><div class="s-val">${d.duplicateSoqlGroups.length}</div><div class="s-lbl">Duplicate Queries</div></div>
      <div class="s-card"><div class="s-val">${d.soqlInLoopSuspects.length}</div><div class="s-lbl">SOQL in Loop</div></div>
      <div class="s-card"><div class="s-val">${d.warnings.length}</div><div class="s-lbl">Exceptions</div></div>
    </div>`;

  if (!d.insights.length)
    return cards + `<div class="empty-state"><span class="icon">check_circle</span><p>No actionable insights. This log looks clean.</p></div>`;

  const sevIcon = {critical:'error',warning:'warning',info:'check_circle'};
  const catIcon = {soql:'search',dml:'edit',cpu:'speed',heap:'memory',general:'info',design:'architecture'};

  return cards + d.insights.map(i => `
    <div class="insight ${i.severity}">
      <div class="insight-hdr">
        <div class="sev-badge ${i.severity}"><span class="icon">${sevIcon[i.severity]||'info'}</span>${i.severity}</div>
        <div class="cat-badge"><span class="icon">${catIcon[i.category]||'info'}</span>${i.category.toUpperCase()}</div>
      </div>
      <h4>${esc(i.title)}</h4>
      <p class="desc">${esc(i.description)}</p>
      <div class="insight-box box-impact"><span class="icon">trending_up</span><div><strong>Impact</strong><p>${esc(i.impact)}</p></div></div>
      <div class="insight-box box-cta"><span class="icon">lightbulb</span><div><strong>Recommended Action</strong><p>${esc(i.cta)}</p></div></div>
      ${i.savingsEstimate?`<div class="savings"><span class="icon">savings</span>${esc(i.savingsEstimate)}</div>`:''}
    </div>`).join('');
}

function renderLimits(d) {
  if (!d.limits.length) return `<div class="empty-state"><span class="icon">info</span><p>No LIMIT_USAGE_FOR_NS block found. Check your debug level includes APEX_PROFILING at INFO+.</p></div>`;
  const icons = {soql_queries:'search',cpu_time:'speed',dml_statements:'edit',dml_rows:'table_rows',heap_size:'memory',callouts:'language',email:'mail',future:'schedule',queueable:'playlist_add_check'};
  return `<div class="limits-grid">${d.limits.map(l => `
    <div class="limit ${l.severity}">
      <div class="limit-hdr">
        <div class="limit-name"><span class="icon">${l.icon}</span>${l.name}</div>
        <span class="limit-val">${l.used} / ${l.max}</span>
      </div>
      <div class="lbar-track"><div class="lbar-fill" style="width:${l.percent}%"></div></div>
      <div class="lbar-pct">${l.percent}%</div>
    </div>`).join('')}</div>`;
}

function renderSoql(d) {
  let html = '';
  if (d.duplicateSoqlGroups.length) {
    html += `<div class="section-title"><span class="icon">content_copy</span>Duplicate Queries</div>
      <div class="tbl-wrap"><table><thead><tr><th>Count</th><th>Total Rows</th><th>Query</th></tr></thead><tbody>
      ${d.duplicateSoqlGroups.map(g=>`<tr><td><span class="badge warn">${g.count}x</span></td><td>${g.totalRows}</td><td class="mono qcell">${esc(g.query)}</td></tr>`).join('')}
      </tbody></table></div>`;
  }
  html += `<div class="section-title"><span class="icon">search</span>All SOQL Queries (${d.totalSoql} queries, ${d.totalSoqlRows.toLocaleString()} rows)</div>
    <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Line</th><th>Rows</th><th>Query</th></tr></thead><tbody>
    ${d.soql.map(q=>`<tr><td class="muted nowrap">${q.time.substring(11,23)}</td><td class="muted">${q.line}</td><td><span class="badge ${q.rows>=100?'warn':'ok'}">${q.rows}</span></td><td class="mono qcell">${esc(q.query)}</td></tr>`).join('')}
    </tbody></table></div>`;
  return html;
}

function renderDml(d) {
  let html = '';
  if (d.dmlByObject.length) {
    const maxOps = d.dmlByObject[0].ops;
    html += `<div class="section-title"><span class="icon">bar_chart</span>DML by Object</div><div class="dml-bars">
      ${d.dmlByObject.map(o=>`<div><div class="dml-bar-label"><span class="mono">${esc(o.object)}</span><span class="muted">${o.ops} ops &bull; ${o.rows} rows</span></div><div class="dml-bar-track"><div class="dml-bar-fill ${o.ops>=3?'w':''}" style="width:${(o.ops/maxOps)*100}%"></div></div></div>`).join('')}
      </div>`;
  }
  html += `<div class="section-title"><span class="icon">edit</span>All DML Operations (${d.totalDml})</div>
    <div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Line</th><th>Operation</th><th>Object</th><th>Rows</th></tr></thead><tbody>
    ${d.dml.map(dd=>`<tr><td class="muted nowrap">${dd.time.substring(11,23)}</td><td class="muted">${dd.line}</td><td><span class="badge ok">${esc(dd.op)}</span></td><td class="mono">${esc(dd.object)}</td><td>${dd.rows}</td></tr>`).join('')}
    </tbody></table></div>`;
  return html;
}

// ======================== PARSER ========================
async function analyze(file) {
  showLoading(file.name);
  const t0 = performance.now();
  const soql=[], dml=[], assignments=[], warnings=[];
  const rawLimits={};
  let curSoql=null, curDml=null, inLimits=false, lines=0, bytes=0;
  const soqlMap = new Map();

  const stream = file.stream().pipeThrough(new TextDecoderStream('utf-8'));
  const reader = stream.getReader();
  let buf = '', lastProg = 0;

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    bytes += value.length;
    buf += value;
    const parts = buf.split('\n');
    buf = parts.pop();

    for (const raw of parts) {
      const line = raw.trim();
      lines++;

      if (inLimits) {
        if (line.includes('|') && line.split('|').length > 2) { inLimits = false; }
        else { parseLimitLine(line, rawLimits); continue; }
      }

      const p = line.split('|');
      if (p.length < 2) continue;
      const ts = p[0], ev = p[1];

      if (ev === 'LIMIT_USAGE_FOR_NS') inLimits = true;
      else if (ev === 'VARIABLE_ASSIGNMENT' && p.length >= 5)
        assignments.push({time:ts,line:lines,variable:p[3],value:(p[4]||'').substring(0,500)});
      else if (ev === 'DML_BEGIN' && p.length >= 6)
        curDml = {time:ts,line:lines,op:p[3],object:p[4],rows:p[5]};
      else if (ev === 'DML_END' && curDml) { dml.push(curDml); curDml = null; }
      else if (ev === 'SOQL_EXECUTE_BEGIN' && p.length >= 5) {
        const q = p.length > 5 ? p.slice(4).join('|') : p[4];
        curSoql = {time:ts,line:lines,query:q.trim(),rows:0};
      }
      else if (ev === 'SOQL_EXECUTE_END' && curSoql && p.length >= 4) {
        curSoql.rows = parseInt(p[3].replace('Rows:',''),10)||0;
        const q = curSoql.query;
        const ex = soqlMap.get(q);
        if (ex) { ex.count++; ex.lines.push(curSoql.line); }
        else soqlMap.set(q, {count:1, lines:[curSoql.line]});
        soql.push(curSoql); curSoql = null;
      }
      else if (ev === 'EXCEPTION_THROWN') warnings.push('Exception: '+p.slice(2).join('|').substring(0,200));
      else if (ev === 'FATAL_ERROR') warnings.push('FATAL: '+p.slice(2).join('|').substring(0,200));
    }

    const now = performance.now();
    if (now - lastProg > 80) { updateProgress(Math.min(bytes/file.size*100,99)); lastProg = now; await new Promise(r=>setTimeout(r,0)); }
  }

  updateProgress(100);

  // Build analysis
  const limits = buildLimits(rawLimits);
  const duplicateSoqlGroups = [], soqlInLoopSuspects = [];
  for (const [q,info] of soqlMap) {
    const totalRows = soql.filter(s=>s.query===q).reduce((s,x)=>s+x.rows,0);
    if (info.count >= 3) soqlInLoopSuspects.push({query:q,count:info.count,line:info.lines[0]});
    else if (info.count > 1) duplicateSoqlGroups.push({query:q,count:info.count,totalRows});
  }
  duplicateSoqlGroups.sort((a,b)=>b.count-a.count);
  soqlInLoopSuspects.sort((a,b)=>b.count-a.count);

  const dmlByObjMap = new Map();
  for (const dd of dml) {
    const e = dmlByObjMap.get(dd.object)||{ops:0,rows:0};
    e.ops++; e.rows += parseInt(dd.rows,10)||0;
    dmlByObjMap.set(dd.object, e);
  }
  const dmlByObject = [...dmlByObjMap.entries()].map(([object,d])=>({object,...d})).sort((a,b)=>b.ops-a.ops);

  const result = {
    soql, dml, assignments, limits, warnings,
    linesProcessed: lines, fileSize: file.size, fileName: file.name,
    parseTimeMs: performance.now()-t0,
    totalSoql: soql.length,
    totalSoqlRows: soql.reduce((s,q)=>s+q.rows,0),
    totalDml: dml.length,
    duplicateSoqlGroups, soqlInLoopSuspects, dmlByObject,
    insights: []
  };
  result.insights = generateInsights(result);
  showResults(result);
}

// ======================== LIMIT PARSER ========================
function parseLimitLine(line, limits) {
  const map = [
    ['Number of SOQL queries:','soql_queries'],['Maximum CPU time:','cpu_time'],
    ['Number of DML statements:','dml_statements'],['Number of DML rows:','dml_rows'],
    ['Maximum heap size:','heap_size'],['Number of callouts:','callouts'],
    ['Number of Email Invocations:','email'],['Number of future calls:','future'],
    ['Number of queueable jobs added to the queue:','queueable']
  ];
  for (const [prefix,key] of map) {
    if (line.includes(prefix)) { limits[key] = line.split(':').pop().trim(); break; }
  }
}

function buildLimits(raw) {
  const icons = {soql_queries:'search',cpu_time:'speed',dml_statements:'edit',dml_rows:'table_rows',heap_size:'memory',callouts:'language',email:'mail',future:'schedule',queueable:'playlist_add_check'};
  const labels = {soql_queries:'SOQL Queries',cpu_time:'CPU Time',dml_statements:'DML Statements',dml_rows:'DML Rows',heap_size:'Heap Size',callouts:'Callouts',email:'Email Invocations',future:'Future Calls',queueable:'Queueable Jobs'};
  return Object.entries(raw).filter(([k])=>labels[k]).map(([k,v])=>{
    const parts = v.split(' out of ');
    const used = parseInt(parts[0],10)||0, max = parts.length>1?parseInt(parts[1],10)||1:1;
    const percent = Math.round(used/max*100);
    return {name:labels[k],used,max,percent,severity:percent>=80?'critical':percent>=50?'warning':'ok',icon:icons[k]||'info'};
  }).sort((a,b)=>b.percent-a.percent);
}

// ======================== INSIGHTS ENGINE ========================
function generateInsights(d) {
  const insights = [];

  // SOQL in Loop
  for (const s of d.soqlInLoopSuspects) {
    const maxQ = d.limits.find(l=>l.name==='SOQL Queries')?.max||100;
    const saved = s.count-1, pct = Math.round(saved/maxQ*100);
    insights.push({id:'soql-loop-'+s.line,severity:'critical',title:`SOQL in Loop Detected (${s.count}x)`,
      description:`The same query executes ${s.count} times, indicating it runs inside a loop. Query: "${s.query.substring(0,80)}..."`,
      impact:`Fixing this saves ${saved} SOQL queries (${pct}% of the ${maxQ} limit). In high-volume scenarios this WILL hit governor limits.`,
      cta:'Move this query BEFORE the loop and use a Map/Set to access results. Use a collection-based WHERE clause (e.g., WHERE Id IN :recordIds).',
      category:'soql',savingsEstimate:`${saved} queries saved`});
  }

  // Duplicate SOQL
  if (d.duplicateSoqlGroups.length) {
    const total = d.duplicateSoqlGroups.reduce((s,g)=>s+g.count-1,0);
    const maxQ = d.limits.find(l=>l.name==='SOQL Queries')?.max||100;
    insights.push({id:'dup-soql',severity:'warning',title:`${d.duplicateSoqlGroups.length} Duplicate SOQL Groups`,
      description:`${d.duplicateSoqlGroups.length} unique queries executed multiple times, wasting ${total} query executions.`,
      impact:`Caching results could save up to ${total} SOQL queries (${Math.round(total/maxQ*100)}% of limit). Also reduces CPU time.`,
      cta:'Cache query results in a variable or use a Singleton/Query Cache utility class.',
      category:'soql',savingsEstimate:`${total} queries saved`});
  }

  // Heavy queries
  const heavy = d.soql.filter(q=>q.rows>=200);
  if (heavy.length) {
    const totalRows = heavy.reduce((s,q)=>s+q.rows,0);
    insights.push({id:'heavy-q',severity:'warning',title:`${heavy.length} Heavy SOQL Queries (200+ rows)`,
      description:`${heavy.length} queries return 200+ rows each. Total: ${totalRows.toLocaleString()} rows. Top query returns ${heavy[0].rows.toLocaleString()} rows.`,
      impact:'Large result sets increase heap usage and CPU time. These can hit the 50,000 row limit or heap limit with more data.',
      cta:'Add more selective WHERE filters, use LIMIT clauses, or implement pagination. SELECT only required fields.',
      category:'soql'});
  }

  // Limits
  const limitCtas = {
    'SOQL Queries':'Reduce queries by caching results, removing duplicates, and moving queries out of loops.',
    'CPU Time':'Optimize Apex logic: avoid nested loops, use Maps instead of repeated list iterations, minimize string concatenation.',
    'DML Statements':'Collect records into Lists and perform bulk DML outside of loops.',
    'DML Rows':'Reduce records being modified. Consider Batch Apex for large volumes.',
    'Heap Size':'Avoid storing large collections in memory. Use SOQL for-loops for chunked processing.'
  };
  for (const l of d.limits) {
    if (l.severity==='critical')
      insights.push({id:'lim-'+l.name,severity:'critical',title:`${l.name} at ${l.percent}% (${l.used}/${l.max})`,
        description:'Governor limit usage is critically high. At risk of failure with more data.',
        impact:'With more records (bulk data load, batch triggers), this WILL exceed the limit causing LimitException and data loss.',
        cta:limitCtas[l.name]||'Review and optimize this governor limit usage.',category:l.name.includes('SOQL')?'soql':l.name.includes('DML')?'dml':l.name.includes('CPU')?'cpu':'general'});
    else if (l.severity==='warning')
      insights.push({id:'lim-'+l.name,severity:'warning',title:`${l.name} at ${l.percent}% (${l.used}/${l.max})`,
        description:'Governor limit usage above 50%. May fail with higher data volumes.',
        impact:'With 2x the current data volume, this will likely exceed the limit.',
        cta:limitCtas[l.name]||'Review and optimize this governor limit usage.',category:l.name.includes('SOQL')?'soql':l.name.includes('DML')?'dml':l.name.includes('CPU')?'cpu':'general'});
  }

  // DML consolidation
  for (const o of d.dmlByObject) {
    if (o.ops>=3)
      insights.push({id:'dml-'+o.object,severity:'warning',title:`${o.ops} DML Operations on ${o.object}`,
        description:`Multiple DML ops on the same object (${o.ops} times, ${o.rows} total rows). Suggests DML inside a loop.`,
        impact:`Consolidating into a single DML saves ${o.ops-1} DML statements (${Math.round((o.ops-1)/150*100)}% of the 150 limit).`,
        cta:'Collect all records into a List and perform a single DML operation outside the loop.',
        category:'dml',savingsEstimate:`${o.ops-1} DML operations saved`});
  }

  // Exceptions
  const exceptions = d.warnings.filter(w=>w.startsWith('Exception:')||w.startsWith('FATAL:'));
  if (exceptions.length) {
    const fatals = exceptions.filter(e=>e.startsWith('FATAL:'));
    insights.push({id:'exceptions',severity:fatals.length?'critical':'warning',
      title:`${exceptions.length} Exception(s) Detected${fatals.length?` (${fatals.length} FATAL)`:''}`,
      description:exceptions.slice(0,3).join(' | '),
      impact:fatals.length?'Fatal errors cause the entire transaction to roll back. All DML is lost.':'Unhandled exceptions can cause partial data processing.',
      cta:'Add try-catch blocks with proper error handling. Log errors to a custom object for monitoring.',
      category:'general'});
  }

  // All good
  if (!insights.length) {
    insights.push({id:'ok',severity:'info',title:'Looking Good!',
      description:'No major issues detected. Governor limits are within safe ranges and no anti-patterns found.',
      impact:'This transaction appears well-optimized for the current data volume.',
      cta:'Continue monitoring as data volumes grow. Consider load testing with higher record counts.',
      category:'general'});
  }

  const order = {critical:0,warning:1,info:2};
  insights.sort((a,b)=>(order[a.severity]??9)-(order[b.severity]??9));
  return insights;
}

// ======================== HELPERS ========================
function scoreColor(d) {
  const c = d.insights.filter(i=>i.severity==='critical').length;
  const w = d.insights.filter(i=>i.severity==='warning').length;
  if (c) return 'critical'; if (w>2) return 'warning'; if (w) return 'moderate'; return 'good';
}
function fmtSize(b) { if(b>=1073741824)return(b/1073741824).toFixed(2)+' GB';if(b>=1048576)return(b/1048576).toFixed(1)+' MB';return(b/1024).toFixed(1)+' KB'; }
function fmtMs(ms) { return ms>=1000?(ms/1000).toFixed(1)+'s':Math.round(ms)+'ms'; }
function esc(s) { if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ======================== INIT ========================
showDropZone();
</script>
